# ============================================================================ #
# Synergy ablation: skills + memory + synergy ON                               #
# ============================================================================ #
# Coordinated injection with Jaccard dedup and shared token budget.
# Compare with skills-memory-no-synergy.yaml for ablation.
llm:
  api_base: ${HBENCH_API_BASE}
  api_key: ${HBENCH_API_KEY}
  model_id: ${HBENCH_MODEL_ID}
  provider: custom
mode: skills_only
proxy:
  host: 0.0.0.0
  port: 30000
rl:
  enabled: false
scheduler:
  calendar:
    enabled: false
  enabled: false
skills:
  auto_evolve: true
  dir: ${METACLAW_ROOT}/memory_data/skills
  enabled: true
  retrieval_mode: template
  task_specific_top_k: 10
  top_k: 6
memory:
  enabled: true
  scope: default
  retrieval_mode: hybrid
  embedding_mode: semantic
  embedding_model: all-MiniLM-L6-v2
  auto_extract: true
  auto_consolidate: true
  max_injected_units: 10
  max_injected_tokens: 1500
  ignore_turn_type: true
  manual_trigger: true
synergy:
  enabled: true
  token_budget: 1200
  skill_ratio: 0.35
  dedup_threshold: 0.5
routing:
  enabled: false
